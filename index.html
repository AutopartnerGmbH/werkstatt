<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<meta name="apple-mobile-web-app-title" content="Werkstatt"/>
<meta name="mobile-web-app-capable" content="yes"/>
<meta name="theme-color" content="#C0141C"/>
<link rel="manifest" id="manifestLink"/>
<title>Autopartner GmbH – Werkstatt</title>
<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;500;600;700&family=Open+Sans:wght@400;600;700&display=swap" rel="stylesheet"/>
<style>
:root{
  --red:#C0141C;--red-dark:#8B0E13;--red-glow:rgba(192,20,28,0.22);
  --silver:#C8C8C8;--silver-dim:#6b7280;
  --bg:#0a0a0a;--bg2:#111111;--bg3:#1a1a1a;--bg4:#222222;
  --border:#2a2a2a;--border2:#333333;
  --text:#f0f0f0;--text-dim:#888888;--text-muted:#444444;
  --font-head:'Oswald',sans-serif;--font-body:'Open Sans',sans-serif;
}
*{box-sizing:border-box;margin:0;padding:0;}
html,body{height:100%;}
body{background:var(--bg);color:var(--text);font-family:var(--font-body);display:flex;flex-direction:column;overflow:hidden;}
input,select,textarea,button{font-family:var(--font-body);}

/* HEADER */
#header{background:var(--bg2);border-bottom:2px solid var(--red);padding:0 16px;
  display:flex;align-items:stretch;height:72px;gap:0;overflow-x:auto;flex-shrink:0;}
.hlogo{display:flex;align-items:center;gap:12px;padding-right:20px;border-right:1px solid var(--border);flex-shrink:0;}
.hlogo-title{font-family:var(--font-head);font-weight:700;font-size:17px;color:var(--text);letter-spacing:.08em;text-transform:uppercase;line-height:1;}
.hlogo-sub{font-family:var(--font-head);font-weight:400;font-size:11px;color:var(--red);letter-spacing:.12em;text-transform:uppercase;margin-top:2px;}
.hlogo-date{color:var(--text-dim);font-size:11px;margin-top:3px;}
.hstat{display:flex;align-items:center;gap:8px;padding:0 14px;border-right:1px solid var(--border);flex-shrink:0;}
.hstat-val{font-family:var(--font-head);font-weight:700;font-size:28px;}
.hstat-lbl{color:var(--text-dim);font-size:10px;font-weight:600;letter-spacing:.08em;text-transform:uppercase;line-height:1.3;}
.hspace{flex:1;}
.hactions{display:flex;align-items:center;gap:6px;padding-left:10px;flex-shrink:0;}

/* SYNC */
#syncStatus{font-size:11px;padding:3px 8px;border-radius:4px;font-weight:600;}
#syncStatus.ok{color:#4ade80;background:rgba(74,222,128,0.1);}
#syncStatus.syncing{color:#fbbf24;background:rgba(251,191,36,0.1);}
#syncStatus.error{color:var(--red);background:rgba(192,20,28,0.1);}

/* MOBILE TABS */
.mobile-tabs{display:none;background:#111;border-bottom:1px solid #2a2a2a;
  padding:6px 8px;overflow-x:auto;gap:4px;flex-shrink:0;}
.mobile-tab{background:var(--bg3);border:none;border-radius:6px;padding:6px 10px;
  color:var(--text-dim);font-size:12px;font-weight:600;cursor:pointer;
  white-space:nowrap;flex-shrink:0;display:flex;align-items:center;gap:5px;
  transition:background .15s;font-family:var(--font-body);}
.mobile-tab.active{background:var(--tab-color,var(--red));color:#fff;}
.mobile-tab .tab-count{background:rgba(0,0,0,0.3);border-radius:3px;padding:1px 5px;font-size:11px;}

/* BOARD */
#board{flex:1;overflow:hidden;padding:12px;display:flex;flex-direction:column;}
.board-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:10px;min-width:960px;height:100%;}

/* LANE */
.lane{display:flex;flex-direction:column;min-height:0;}
.lane-header{border-radius:6px 6px 0 0;padding:10px 12px;display:flex;align-items:center;gap:8px;flex-shrink:0;}
.lane-title{font-family:var(--font-head);font-size:14px;font-weight:600;letter-spacing:.06em;text-transform:uppercase;
  overflow:hidden;text-overflow:ellipsis;white-space:nowrap;flex:1;}
.lane-count{border-radius:4px;min-width:24px;height:24px;display:flex;align-items:center;justify-content:center;
  font-family:var(--font-head);font-weight:700;font-size:13px;}
.lane-toggle-btn{background:rgba(0,0,0,0.3);border-radius:4px;padding:2px 6px;cursor:pointer;
  font-size:10px;font-weight:700;font-family:var(--font-head);letter-spacing:.04em;flex-shrink:0;}
.lane-body{border-radius:0 0 6px 6px;padding:6px;flex:1;overflow-y:auto;
  transition:background .15s,border-color .15s;border:2px solid var(--border);background:var(--bg2);}
.lane-empty{color:var(--text-muted);text-align:center;padding:20px 8px;font-size:12px;
  font-family:var(--font-head);letter-spacing:.06em;text-transform:uppercase;}

/* CARD */
.card-wrap{margin-bottom:6px;border-radius:6px;overflow:hidden;}
.card-top{display:flex;align-items:center;padding:10px 12px;cursor:pointer;user-select:none;transition:background .15s;}
.card-top:hover{background:rgba(255,255,255,0.04);}
.card-top-prio{width:8px;height:8px;border-radius:50%;flex-shrink:0;margin-right:8px;}
.card-top-kz{font-family:var(--font-head);font-weight:700;font-size:17px;letter-spacing:.1em;white-space:nowrap;flex-shrink:0;margin-right:10px;}
.card-top-kunde{font-size:14px;font-weight:600;color:var(--silver);flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.card-top-chevron{font-size:18px;color:var(--text-muted);flex-shrink:0;margin-left:6px;transition:transform .2s;line-height:1;}
.card-top-chevron.open{transform:rotate(180deg);}
.card-body{padding:4px 12px 8px;}
.card-fz{font-size:12px;color:var(--text-dim);margin-bottom:6px;}
.card-hints{background:rgba(0,0,0,0.3);border-radius:4px;padding:6px 10px;margin-bottom:4px;}
.hint-done-label{color:#4ade80;font-size:11px;font-weight:700;margin-bottom:4px;}
.card-hint{display:flex;align-items:center;gap:8px;padding:4px 0;}
.card-hint+.card-hint{border-top:1px solid var(--border);}
.hint-input{color:#ccc;font-size:13px;flex:1;background:transparent;border:none;outline:none;
  font-family:var(--font-body);padding:2px 4px;border-radius:3px;cursor:text;}
.hint-input:focus{background:var(--bg4);color:var(--text);}
.hint-input.done{color:var(--text-muted);text-decoration:line-through;}
.btn-erledigt{background:var(--bg4);border:1px solid var(--border2);border-radius:4px;
  color:var(--text-dim);padding:2px 8px;cursor:pointer;font-size:11px;font-weight:700;white-space:nowrap;flex-shrink:0;}
.btn-erledigt:hover{background:#14532d;border-color:#16a34a;color:#4ade80;}
.btn-erledigt.done{background:#14532d44;border-color:#16a34a88;color:#4ade80;}
.hint-add-inline{display:flex;gap:6px;margin-top:6px;}
.hint-add-inline input{flex:1;background:var(--bg4);border:1px dashed var(--border2);border-radius:4px;
  color:var(--text-dim);padding:4px 8px;font-size:12px;outline:none;}
.hint-add-inline input:focus{border-color:var(--red);color:var(--text);}
.hint-add-inline button{background:var(--red);border:none;border-radius:4px;color:#fff;padding:0 10px;cursor:pointer;font-size:16px;font-weight:700;}
.abholbereit-banner{padding:6px 12px;color:#4ade80;font-size:11px;font-weight:700;
  font-family:var(--font-head);letter-spacing:.08em;text-transform:uppercase;
  border-bottom:1px solid rgba(74,222,128,0.25);}
.card-time{color:var(--text-muted);font-size:11px;padding:0 12px 6px;}
.card-actions{display:flex;border-top:1px solid var(--border);}
.card-actions button{flex:1;background:transparent;border:none;border-right:1px solid var(--border);
  color:var(--text-dim);padding:9px 4px;cursor:pointer;font-size:11px;font-weight:600;transition:all .15s;}
.card-actions button:last-child{border-right:none;}
.card-actions button:hover{background:rgba(255,255,255,0.05);color:var(--text);}

/* MITARBEITER */
.ma-badge{display:inline-flex;align-items:center;gap:5px;background:rgba(192,20,28,0.15);
  border:1px solid rgba(192,20,28,0.4);border-radius:20px;padding:3px 10px 3px 6px;
  font-size:12px;color:#E8454D;font-weight:600;margin:2px;}
.ma-badge-avatar{width:20px;height:20px;border-radius:50%;background:var(--red);color:#fff;
  display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;flex-shrink:0;}
.ma-badge-remove{background:none;border:none;color:rgba(232,69,77,0.5);cursor:pointer;font-size:14px;padding:0;line-height:1;margin-left:2px;}
.btn-ma{background:var(--bg4);border:1px dashed var(--border2);border-radius:20px;
  color:var(--text-dim);padding:3px 12px;cursor:pointer;font-size:12px;font-weight:600;transition:all .15s;white-space:nowrap;}
.btn-ma:hover{border-color:var(--red);color:var(--red);}
#myNameBadge{display:flex;align-items:center;gap:6px;padding:0 10px;border-right:1px solid var(--border);flex-shrink:0;cursor:pointer;}
.my-avatar{width:28px;height:28px;border-radius:50%;background:var(--red);color:#fff;
  display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;}
#myNameText{font-size:12px;color:var(--text-dim);font-weight:600;}

/* SUCHE */
.search-wrap{display:flex;align-items:center;background:var(--bg3);border:1px solid var(--border2);
  border-radius:4px;overflow:hidden;flex-shrink:0;}
.search-wrap input{background:transparent;border:none;outline:none;color:var(--text);
  padding:6px 10px;font-size:12px;width:150px;}
.search-wrap input::placeholder{color:var(--text-muted);}
.search-clear{background:none;border:none;color:var(--text-muted);cursor:pointer;padding:0 8px;font-size:14px;display:none;}
.search-clear.visible{display:block;}

@keyframes flashCard{0%{box-shadow:0 0 0 0 transparent;}25%{box-shadow:0 0 0 8px var(--flash-color);}
  50%{box-shadow:0 0 0 0 transparent;}75%{box-shadow:0 0 0 8px var(--flash-color);}100%{box-shadow:0 0 0 0 transparent;}}
.card-flash{animation:flashCard 2s ease-in-out forwards;}

/* DIKTIER */
.btn-diktier{background:var(--bg4);border:1px solid var(--border2);border-radius:20px;
  color:var(--text-dim);padding:5px 14px;cursor:pointer;font-size:12px;font-weight:600;
  transition:all .15s;white-space:nowrap;display:flex;align-items:center;gap:6px;}
.btn-diktier:hover{border-color:var(--red);color:var(--red);}
.btn-diktier.recording{background:rgba(192,20,28,0.15);border-color:var(--red);color:var(--red);animation:pulse 1s infinite;}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:0.5}}
.diktier-preview{background:var(--bg3);border:1px solid var(--border2);border-radius:6px;
  padding:10px 14px;margin-top:8px;font-size:13px;color:var(--text-dim);line-height:1.6;}
.diktier-preview.active{border-color:var(--red);color:var(--text);}

/* DIAGNOSE */
.diag-section{margin-bottom:14px;}
.diag-section-title{font-family:var(--font-head);font-size:12px;font-weight:700;
  letter-spacing:.1em;text-transform:uppercase;color:var(--red);
  padding-bottom:6px;border-bottom:1px solid var(--border);margin-bottom:8px;}
.diag-grid{display:grid;grid-template-columns:1fr 1fr;gap:4px 12px;}
.diag-row{display:flex;align-items:center;justify-content:space-between;
  padding:5px 8px;background:var(--bg3);border-radius:4px;gap:8px;}
.diag-row-label{font-size:13px;color:var(--text);flex:1;}
.diag-btns{display:flex;gap:4px;flex-shrink:0;}
.diag-btn{border:none;border-radius:3px;padding:3px 10px;cursor:pointer;
  font-size:11px;font-weight:700;transition:all .15s;font-family:var(--font-body);}
.diag-btn-ok{background:var(--bg4);color:var(--text-dim);}
.diag-btn-ok.active{background:#14532d;color:#4ade80;}
.diag-btn-nok{background:var(--bg4);color:var(--text-dim);}
.diag-btn-nok.active{background:#7f1d1d;color:#fca5a5;}
.diag-input-row{display:flex;flex-direction:column;gap:4px;margin-bottom:8px;}
.diag-input-row label{font-size:11px;color:var(--text-dim);font-weight:700;letter-spacing:.08em;text-transform:uppercase;}
.diag-input-row input,.diag-input-row textarea{
  background:var(--bg3);border:1px solid var(--border2);border-radius:4px;
  color:var(--text);padding:8px 10px;font-size:13px;outline:none;font-family:var(--font-body);}
.diag-input-row textarea{resize:vertical;}

/* ADMIN */
.admin-section{background:var(--bg3);border-radius:8px;padding:16px;margin-bottom:14px;}
.admin-section-title{font-family:var(--font-head);font-size:13px;font-weight:600;
  color:var(--red);letter-spacing:.1em;text-transform:uppercase;margin-bottom:12px;
  padding-bottom:8px;border-bottom:1px solid var(--border);}
.admin-row{display:flex;align-items:center;justify-content:space-between;
  padding:8px 0;border-bottom:1px solid var(--border);gap:12px;}
.admin-row:last-child{border-bottom:none;}
.admin-row-label{font-size:13px;color:var(--text);flex:1;}
.admin-row-sub{font-size:11px;color:var(--text-dim);margin-top:2px;}
.stat-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;}
.stat-box{background:var(--bg4);border-radius:6px;padding:12px;text-align:center;}
.stat-box-val{font-family:var(--font-head);font-size:26px;font-weight:700;color:var(--red);}
.stat-box-lbl{font-size:11px;color:var(--text-dim);margin-top:2px;letter-spacing:.06em;text-transform:uppercase;}

/* PIN */
#pinScreen{position:fixed;inset:0;background:#030712;z-index:999;
  display:flex;flex-direction:column;align-items:center;justify-content:center;gap:20px;}
.pin-logo{font-family:var(--font-head);font-size:22px;color:var(--text);letter-spacing:.1em;text-transform:uppercase;}
.pin-sub{font-family:var(--font-head);font-size:12px;color:var(--red);letter-spacing:.14em;text-transform:uppercase;margin-top:-14px;}
.pin-dots{display:flex;gap:12px;margin:8px 0;}
.pin-dot{width:16px;height:16px;border-radius:50%;border:2px solid var(--border2);background:transparent;transition:all .15s;}
.pin-dot.filled{background:var(--red);border-color:var(--red);}
.pin-dot.error{background:#7f1d1d;border-color:var(--red);animation:shake .3s;}
@keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-6px)}75%{transform:translateX(6px)}}
.pin-pad{display:grid;grid-template-columns:repeat(3,72px);gap:10px;}
.pin-key{width:72px;height:72px;border-radius:50%;background:var(--bg3);
  border:1px solid var(--border2);color:var(--text);font-size:22px;font-weight:500;
  cursor:pointer;transition:all .15s;font-family:var(--font-head);}
.pin-key:hover{background:var(--bg4);border-color:var(--red);}
.pin-key:active{transform:scale(0.92);}
.pin-hint{font-size:12px;color:var(--text-muted);margin-top:4px;}
.btn-bio{background:rgba(192,20,28,0.15);border:1px solid var(--red);border-radius:8px;
  color:var(--red);padding:10px 20px;cursor:pointer;font-size:14px;font-weight:600;
  font-family:var(--font-head);letter-spacing:.06em;text-transform:uppercase;
  display:flex;align-items:center;gap:8px;}

/* BUTTONS */
.btn-primary{background:var(--red);border:none;border-radius:4px;color:#fff;padding:7px 14px;
  cursor:pointer;font-size:12px;font-weight:700;font-family:var(--font-head);
  letter-spacing:.08em;text-transform:uppercase;}
.btn-primary:hover{background:var(--red-dark);}
.btn-secondary{background:var(--bg3);border:1px solid var(--border2);border-radius:4px;
  color:var(--text-dim);padding:7px 12px;cursor:pointer;font-size:12px;font-weight:600;}
.btn-secondary:hover{background:var(--bg4);color:var(--text);}

/* MÜLLEIMER */
#trash{position:fixed;bottom:16px;left:50%;transform:translateX(-50%);
  width:64px;height:64px;border-radius:50%;background:#1a0000;border:2px dashed #7f1d1d;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  font-size:22px;color:#7f1d1d;transition:all .2s;z-index:100;opacity:0;pointer-events:none;}
#trash.drag-active{opacity:1;pointer-events:all;}
#trash.over{background:#450a0a;border-color:var(--red);border-style:solid;color:var(--red);
  transform:translateX(-50%) scale(1.15);box-shadow:0 0 30px var(--red-glow);}
#trash-label{font-size:9px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;margin-top:2px;}

/* MODAL */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.9);z-index:200;
  display:flex;align-items:center;justify-content:center;padding:16px;}
.modal-box{background:var(--bg2);border:1px solid var(--border2);border-top:3px solid var(--red);
  border-radius:6px;width:100%;max-width:700px;padding:24px;
  box-shadow:0 40px 80px rgba(0,0,0,.8);max-height:92vh;overflow-y:auto;}
.modal-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:20px;}
.modal-title{font-family:var(--font-head);font-weight:600;font-size:14px;color:var(--text);
  letter-spacing:.1em;text-transform:uppercase;}
.modal-close{background:none;border:none;color:var(--text-dim);cursor:pointer;font-size:20px;padding:0 4px;}
.form-grid2{display:grid;grid-template-columns:1fr 1fr;gap:0 14px;}
.form-grid3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:0 14px;}
.field{margin-bottom:14px;}
.field label{display:block;color:var(--text-dim);font-size:11px;font-weight:700;
  letter-spacing:.1em;text-transform:uppercase;margin-bottom:5px;}
.field input,.field select,.field textarea{width:100%;background:var(--bg3);
  border:1px solid var(--border2);border-radius:4px;color:var(--text);
  padding:10px 12px;font-size:14px;outline:none;}
.field input:focus,.field select:focus,.field textarea:focus{border-color:var(--red);}
.field textarea{resize:vertical;}
.form-footer{display:flex;justify-content:flex-end;gap:10px;margin-top:8px;}
.section-label{color:var(--red);font-size:11px;font-weight:700;letter-spacing:.1em;
  font-family:var(--font-head);text-transform:uppercase;margin-bottom:10px;
  padding-bottom:6px;border-bottom:1px solid var(--border);}
.hints-list{background:var(--bg3);border:1px solid var(--border2);border-radius:4px;padding:6px 10px;margin-bottom:8px;}
.hint-row{display:flex;align-items:center;gap:8px;padding:5px 0;}
.hint-row+.hint-row{border-top:1px solid var(--border);}
.hint-row input[type="text"]{flex:1;background:transparent;border:none;outline:none;font-size:14px;padding:2px 0;color:var(--text);}
.hint-row input[type="text"].done{color:var(--text-muted);text-decoration:line-through;}
.hint-check{width:20px;height:20px;border-radius:4px;border:2px solid var(--border2);background:none;
  cursor:pointer;flex-shrink:0;display:flex;align-items:center;justify-content:center;
  font-size:12px;transition:all .15s;padding:0;color:transparent;}
.hint-check.checked{background:#14532d;border-color:#16a34a;color:#4ade80;}
.hint-remove{background:none;border:none;color:var(--text-muted);cursor:pointer;font-size:16px;padding:0 4px;}
.hint-add{display:flex;gap:8px;}
.hint-add input{flex:1;background:var(--bg3);border:1px solid var(--border2);border-radius:4px;
  color:var(--text);padding:10px 12px;font-size:13px;outline:none;}
.hint-add input:focus{border-color:var(--red);}
.hint-add-btn{background:var(--red);border:none;border-radius:4px;color:#fff;
  padding:0 16px;cursor:pointer;font-size:20px;font-weight:700;}

/* MOBILE */
@media(max-width:768px){
  body{overflow:auto;}
  #header{height:auto;flex-wrap:wrap;padding:8px 12px;gap:6px;}
  .hlogo{padding-right:12px;border-right:none;}
  .hstat{padding:0 8px;}
  .hstat-val{font-size:20px;}
  .hstat-lbl{font-size:9px;}
  .hactions{padding-left:0;width:100%;justify-content:flex-end;}
  .mobile-tabs{display:flex;}
  #board{padding:8px;overflow:visible;}
  .board-grid{display:block !important;min-width:unset !important;}
  .lane{display:none;}
  .lane.mobile-active{display:flex;}
}

::-webkit-scrollbar{width:5px;}
::-webkit-scrollbar-track{background:var(--bg);}
::-webkit-scrollbar-thumb{background:var(--border2);border-radius:3px;}
::-webkit-scrollbar-thumb:hover{background:var(--red);}
</style>
</head>
<body>

<div id="pinScreen">
  <div class="pin-logo">Werkstatt</div>
  <div class="pin-sub">Autopartner GmbH</div>
  <div class="pin-dots" id="pinDots">
    <div class="pin-dot" id="pd0"></div><div class="pin-dot" id="pd1"></div>
    <div class="pin-dot" id="pd2"></div><div class="pin-dot" id="pd3"></div>
    <div class="pin-dot" id="pd4"></div><div class="pin-dot" id="pd5"></div>
  </div>
  <div class="pin-pad">
    <button class="pin-key" onclick="pinPress('1')">1</button>
    <button class="pin-key" onclick="pinPress('2')">2</button>
    <button class="pin-key" onclick="pinPress('3')">3</button>
    <button class="pin-key" onclick="pinPress('4')">4</button>
    <button class="pin-key" onclick="pinPress('5')">5</button>
    <button class="pin-key" onclick="pinPress('6')">6</button>

// ── BIOMETRIE ──
const BIO_KEY='werkstatt-bio-cred';
function str2ab(s){return new TextEncoder().encode(s).buffer;}
function ab2b64(b){return btoa(String.fromCharCode(...new Uint8Array(b)));}
function b642ab(b){const bin=atob(b);const buf=new Uint8Array(bin.length);for(let i=0;i<bin.length;i++)buf[i]=bin.charCodeAt(i);return buf.buffer;}
async function bioVerfuegbar(){if(!window.PublicKeyCredential)return false;try{return await PublicKeyCredential.isUserVerifyingPlatformAuthenticatorAvailable();}catch{return false;}}
async function bioRegistrieren(){
  try{
    const cred=await navigator.credentials.create({publicKey:{
      challenge:str2ab('werkstatt-reg-'+Date.now()),
      rp:{name:'Autopartner Werkstatt',id:location.hostname},
      user:{id:str2ab('werkstatt-user'),name:'Werkstatt',displayName:'Werkstatt'},
      pubKeyCredParams:[{alg:-7,type:'public-key'},{alg:-257,type:'public-key'}],
      authenticatorSelection:{authenticatorAttachment:'platform',userVerification:'required'},
      timeout:60000
    }});
    localStorage.setItem(BIO_KEY,ab2b64(cred.rawId));
    return true;
  }catch{return false;}
}
async function bioLogin(){
  const credId=localStorage.getItem(BIO_KEY); if(!credId)return;
  const hint=document.getElementById('pinHint');
  if(hint){hint.textContent='⏳ Warte …';}
  try{
    await navigator.credentials.get({publicKey:{
      challenge:str2ab('werkstatt-'+Date.now()),
      allowCredentials:[{id:b642ab(credId),type:'public-key'}],
      userVerification:'required',timeout:60000
    }});
    pinErfolgreich();
  }catch{
    if(hint){hint.textContent='❌ Nicht erkannt'; hint.style.color='var(--red)';}
    setTimeout(()=>{if(hint){hint.textContent='Code eingeben';hint.style.color='';}},2000);
  }
}

// ── SUPABASE ──
async function sbFetch(path,options={}){
  const res=await fetch(SUPABASE_URL+path,{...options,headers:{'apikey':SUPABASE_KEY,'Authorization':'Bearer '+SUPABASE_KEY,'Content-Type':'application/json','Prefer':'return=representation',...options.headers}});
  if(!res.ok)throw new Error(await res.text());
  const t=await res.text();return t?JSON.parse(t):[];
}
function setSync(s,m){const el=document.getElementById('syncStatus');el.className=s;el.textContent=m;}
async function loadAutos(){
  try{
    setSync('syncing','↻ Laden …');
    const data=await sbFetch('/rest/v1/auftraege?order=erstellt_am.asc');
    autos=data.map(dbToAuto);
    setSync('ok','● Live');render();
  }catch(e){setSync('error','✕ Fehler');console.error(e);}
}
function dbToAuto(row){
  return{
    id:row.id,kennzeichen:row.kennzeichen||'',fahrzeug:row.fahrzeug||'',
    kunde:row.kunde||'',platz:row.platz||'',prioritaet:row.prioritaet||'Normal',
    status:row.status||'parkplatz',auftragsnr:row.auftragsnr||'',
    hinweise:(row.hinweise||[]).map(h=>typeof h==='string'?{text:h,done:false}:h),
    diagnose:row.diagnose||null,
    mitarbeiter:row.mitarbeiter||[],
    dateien:row.dateien||[],
    arbeiten:row.arbeiten||[],
    material:row.material||[],
    lieferscheine:row.lieferscheine||[],
    eingang:row.eingang||uhrzeit(),datum:row.datum||datumKurz(),statusSeit:row.status_seit||uhrzeit(),
  };
}
function autoToDb(a){
  return{id:a.id,kennzeichen:a.kennzeichen,fahrzeug:a.fahrzeug,kunde:a.kunde,platz:a.platz,
    prioritaet:a.prioritaet,status:a.status,auftragsnr:a.auftragsnr||'',
    hinweise:a.hinweise,diagnose:a.diagnose||null,mitarbeiter:a.mitarbeiter||[],
    dateien:a.dateien||[],arbeiten:a.arbeiten||[],material:a.material||[],
    lieferscheine:a.lieferscheine||[],
    eingang:a.eingang,datum:a.datum,status_seit:a.statusSeit,
    geaendert_am:new Date().toISOString()};
}
async function saveAuto(a){
  try{
    setSync('syncing','↻ …');
    await sbFetch('/rest/v1/auftraege',{method:'POST',headers:{'Prefer':'resolution=merge-duplicates,return=representation'},body:JSON.stringify(autoToDb(a))});
    setSync('ok','● Live');
  }catch(e){setSync('error','✕ Fehler');console.error(e);}
}
async function deleteAuto(id){
  try{await sbFetch('/rest/v1/auftraege?id=eq.'+id,{method:'DELETE'});}catch(e){console.error(e);}
}
async function uploadFile(file,pfad){
  const res=await fetch(SUPABASE_URL+'/storage/v1/object/'+pfad,{method:'POST',
    headers:{'apikey':SUPABASE_KEY,'Authorization':'Bearer '+SUPABASE_KEY,'Content-Type':file.type,'x-upsert':'true'},body:file});
  if(!res.ok){
    const errText=await res.text();
    let msg='Upload fehlgeschlagen';
    try{const j=JSON.parse(errText);msg=j.message||j.error||msg;}catch{}
    throw new Error(msg);
  }
  return SUPABASE_URL+'/storage/v1/object/public/'+pfad;
}

// ── POLLING ──
function startRealtime(){

    try{

function renderMobileTabs(){
  const c=document.getElementById('mobileTabs');if(!c)return;
  c.innerHTML='';

    const count=autos.filter(a=>a.status===s.id).length;
    const btn=document.createElement('button');
    btn.className='mobile-tab'+(activeMobileTab===s.id?' active':'');

    btn.innerHTML=`<span>${s.icon}</span><span>${s.label}</span>${count>0?`<span class="tab-count">${count}</span>`:''}`;
    btn.addEventListener('click',()=>{activeMobileTab=s.id;renderMobileTabs();updateMobileLanes();});
    c.appendChild(btn);
  });
}
function updateMobileLanes(){
  if(window.innerWidth>768)return;
  document.querySelectorAll('.lane').forEach(l=>l.classList.remove('mobile-active'));
  const al=document.querySelector(`.lane[data-status="${activeMobileTab}"]`);
  if(al)al.classList.add('mobile-active');
}

// ── COLLAPSE ──
function isCollapsed(id,autoCollapse){return autoCollapse?!expandedCards.has(id):collapsedCards.has(id);}
function toggleCard(id,autoCollapse){
  if(autoCollapse){if(expandedCards.has(id))expandedCards.delete(id);else expandedCards.add(id);}
  else{if(collapsedCards.has(id))collapsedCards.delete(id);else collapsedCards.add(id);}
  render();
}

// ── RENDER ──
function render(){
  document.getElementById('statTotal').textContent=autos.length;
  document.getElementById('statAktiv').textContent=autos.filter(a=>a.status==='in_arbeit').length;
  document.getElementById('statTeile').textContent=autos.filter(a=>a.status==='teile').length;
  document.getElementById('statAllesDa').textContent=autos.filter(a=>a.status==='alles_da').length;
  document.getElementById('statUnterbrochen').textContent=autos.filter(a=>a.status==='unterbrochen').length;

  const grid=document.getElementById('boardGrid');grid.innerHTML='';
  STATI.forEach(s=>{
    const cards=autos.filter(a=>a.status===s.id)
      .sort((a,b)=>({'Express':0,'Dringend':1,'Normal':2}[a.prioritaet])-({'Express':0,'Dringend':1,'Normal':2}[b.prioritaet]));
    const autoCollapse=COLLAPSE_AT===0||cards.length>=COLLAPSE_AT;

    const lane=document.createElement('div');lane.className='lane';lane.dataset.status=s.id;

    const hdr=document.createElement('div');hdr.className='lane-header';
    hdr.style.cssText=`background:${s.color};border:1px solid ${s.accent}44;box-shadow:0 0 14px ${s.glow}`;
    hdr.innerHTML=`<span style="font-size:18px">${s.icon}</span>
      <span class="lane-title" style="color:${s.accent}">${s.label}</span>
      ${cards.length>0?`<span class="lane-count" style="background:rgba(0,0,0,0.4);color:${s.accent}">${cards.length}</span>`:''}`;
    if(cards.length>0){
      const btn=document.createElement('button');btn.className='lane-toggle-btn';
      btn.style.cssText=`border:1px solid ${s.accent}66;color:${s.accent}`;
      const allOpen=cards.every(c=>expandedCards.has(c.id));
      btn.textContent=allOpen?'▲ Alle zu':'▼ Alle auf';
      btn.addEventListener('click',e=>{e.stopPropagation();if(allOpen)cards.forEach(c=>expandedCards.delete(c.id));else cards.forEach(c=>expandedCards.add(c.id));render();});
      hdr.appendChild(btn);
    }
    lane.appendChild(hdr);

    const body=document.createElement('div');body.className='lane-body';
    body.addEventListener('dragover',e=>{e.preventDefault();if(dragFrom!==s.id){body.style.background='#1a0a0a';body.style.borderColor=s.accent;body.style.boxShadow=`inset 0 0 20px ${s.glow}`;}});
    body.addEventListener('dragleave',()=>{body.style.background='';body.style.borderColor='';body.style.boxShadow='';});
    body.addEventListener('drop',e=>{
      e.preventDefault();body.style.background='';body.style.borderColor='';body.style.boxShadow='';
      if(dragId&&dragFrom!==s.id){const a=autos.find(x=>x.id===dragId);if(a){
        if(s.id==='fertig'&&(a.mitarbeiter||[]).length>0){
          a.mitarbeiterHistory=(a.mitarbeiterHistory||[]);
          a.mitarbeiter.forEach(m=>{if(!a.mitarbeiterHistory.find(h=>h.name===m.name))a.mitarbeiterHistory.push(m);});
        }
        a.status=s.id;a.statusSeit=uhrzeit();saveAuto(a);}render();}
    });

    if(cards.length===0){body.innerHTML='<div class="lane-empty">Leer</div>';}
    else cards.forEach(a=>body.appendChild(makeCard(a,s,autoCollapse,isCollapsed(a.id,autoCollapse))));
    lane.appendChild(body);grid.appendChild(lane);
  });

  renderMobileTabs();updateMobileLanes();
}

// ── KARTE ──
function makeCard(a,s,autoCollapse,collapsed){
  const wrap=document.createElement('div');wrap.className='card-wrap';
  wrap.style.cssText=`background:var(--bg3);border:1px solid ${s.accent}33;box-shadow:0 2px 12px ${s.glow}`;

  if(a.status==='fertig'){const b=document.createElement('div');b.className='abholbereit-banner';b.textContent='🏁 Fahrzeug abholbereit';wrap.appendChild(b);}

  const top=document.createElement('div');top.className='card-top';top.draggable=true;
  top.addEventListener('dragstart',e=>{dragId=a.id;dragFrom=a.status;e.dataTransfer.effectAllowed='move';setTimeout(()=>wrap.style.opacity='0.4',0);});
  top.addEventListener('dragend',()=>{wrap.style.opacity='1';dragId=null;dragFrom=null;});
  top.addEventListener('click',()=>toggleCard(a.id,autoCollapse));

  const prio=document.createElement('div');prio.className='card-top-prio';
  prio.style.cssText=`background:${PRIO_DOT[a.prioritaet]};${a.prioritaet!=='Normal'?`box-shadow:0 0 5px ${PRIO_DOT[a.prioritaet]}`:''}`;
  const kz=document.createElement('span');kz.className='card-top-kz';kz.style.color=s.accent;kz.textContent=a.kennzeichen||'—';
  const fzSpan=document.createElement('span');fzSpan.style.cssText='font-size:13px;color:var(--text-dim);white-space:nowrap;flex-shrink:0;margin-right:8px';fzSpan.textContent=a.fahrzeug||'';
  const kunde=document.createElement('span');kunde.className='card-top-kunde';kunde.textContent=a.kunde||'';
  const chev=document.createElement('span');chev.className='card-top-chevron'+(collapsed?'':' open');chev.textContent='▾';
  top.appendChild(prio);top.appendChild(kz);if(a.fahrzeug)top.appendChild(fzSpan);top.appendChild(kunde);top.appendChild(chev);
  wrap.appendChild(top);

  if(!collapsed){
    const body=document.createElement('div');body.className='card-body';
    const fz=document.createElement('div');fz.className='card-fz';
    fz.innerHTML=`${a.fahrzeug||'Fahrzeug unbekannt'}${a.platz?` · <span style="color:var(--text-muted)">${a.platz}</span>`:''}`;
    body.appendChild(fz);

    // Stichpunkte
    if((a.hinweise||[]).length>0){
      const hd=document.createElement('div');hd.className='card-hints';
      const dc=(a.hinweise||[]).filter(h=>h.done).length;
      if(dc>0){const l=document.createElement('div');l.className='hint-done-label';l.textContent=`✓ ${dc} von ${a.hinweise.length} erledigt`;hd.appendChild(l);}
      (a.hinweise||[]).forEach((h,i)=>{
        const row=document.createElement('div');row.className='card-hint';
        const inp=document.createElement('input');inp.className='hint-input'+(h.done?' done':'');inp.type='text';inp.value=h.text;
        if(h.done)inp.disabled=true;
        inp.addEventListener('click',e=>e.stopPropagation());
        inp.addEventListener('blur',()=>{const v=inp.value.trim();if(v&&v!==h.text){h.text=v;saveAuto(a);}});
        inp.addEventListener('keydown',e=>{if(e.key==='Enter')inp.blur();});
        const btn=document.createElement('button');btn.className='btn-erledigt'+(h.done?' done':'');btn.textContent=h.done?'↩':'✓';
        btn.addEventListener('click',e=>{e.stopPropagation();h.done=!h.done;saveAuto(a);render();});
        row.appendChild(inp);row.appendChild(btn);hd.appendChild(row);
      });
      const ar=document.createElement('div');ar.className='hint-add-inline';
      const ai=document.createElement('input');ai.placeholder='+ Stichpunkt …';
      ai.addEventListener('click',e=>e.stopPropagation());
      ai.addEventListener('keydown',e=>{if(e.key==='Enter'){e.stopPropagation();const v=ai.value.trim();if(v){a.hinweise.push({text:v,done:false});saveAuto(a);render();}}});
      const ab=document.createElement('button');ab.textContent='+';
      ab.addEventListener('click',e=>{e.stopPropagation();const v=ai.value.trim();if(v){a.hinweise.push({text:v,done:false});saveAuto(a);render();}});
      ar.appendChild(ai);ar.appendChild(ab);hd.appendChild(ar);
      body.appendChild(hd);
    }

    wrap.appendChild(body);

    const timeEl=document.createElement('div');timeEl.className='card-time';timeEl.textContent=`${a.datum} · ${a.eingang}`;
    wrap.appendChild(timeEl);

    // Mitarbeiter
    const maDiv=document.createElement('div');maDiv.style.cssText='padding:4px 12px 8px;display:flex;flex-wrap:wrap;align-items:center;gap:4px;';
    (a.mitarbeiter||[]).forEach(m=>{
      const badge=document.createElement('div');badge.className='ma-badge';
      const isMe=m.name===myName;
      badge.innerHTML=`<div class="ma-badge-avatar">${m.name.charAt(0).toUpperCase()}</div><span>${m.name}</span><span style="font-size:10px;color:rgba(232,69,77,0.6);margin-left:2px">seit ${m.seit}</span>`;
      if(isMe){const rb=document.createElement('button');rb.className='ma-badge-remove';rb.textContent='✕';rb.addEventListener('click',e=>{e.stopPropagation();removeMitarbeiter(a.id,m.name);});badge.appendChild(rb);}
      maDiv.appendChild(badge);
    });
    const amIon=(a.mitarbeiter||[]).some(m=>m.name===myName);
    const btnMa=document.createElement('button');btnMa.className='btn-ma';
    btnMa.textContent=amIon?'✓ Ich bin dran – Austragen':'+ Ich arbeite daran';
    if(amIon){btnMa.style.borderColor='var(--red)';btnMa.style.color='var(--red)';btnMa.style.background='rgba(192,20,28,0.1)';}
    btnMa.addEventListener('click',e=>{e.stopPropagation();toggleMitarbeiter(a.id);});
    maDiv.appendChild(btnMa);

    // Wenn fertig: zeige wer daran gearbeitet hat
    if(a.status==='fertig'&&(a.mitarbeiterHistory||[]).length>0){
      const hist=document.createElement('div');
      hist.style.cssText='padding:4px 12px 6px;font-size:11px;color:var(--text-dim)';
      hist.innerHTML='<span style="color:#4ade80">✓ Bearbeitet von: </span>'+a.mitarbeiterHistory.map(m=>`<span style="font-weight:600;color:var(--text)">${m.name}</span>`).join(', ');
      wrap.appendChild(hist);
    }
    wrap.appendChild(maDiv);

    // SFK-PDF Badge (falls vorhanden)
    const sfkDatei=(a.dateien||[]).find(d=>d.typ==='sfk_auftrag');
    if(sfkDatei){
      const sfkBar=document.createElement('div');
      sfkBar.style.cssText='padding:6px 12px;display:flex;align-items:center;gap:8px;border-top:1px solid var(--border);background:rgba(192,20,28,0.06);';
      sfkBar.innerHTML=`<span style="font-size:14px">📄</span><span style="font-size:12px;color:var(--text-dim);flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${sfkDatei.name}</span>`;
      const btnPdf=document.createElement('a');
      btnPdf.href=sfkDatei.url;btnPdf.target='_blank';btnPdf.rel='noopener';
      btnPdf.style.cssText='background:var(--red);color:#fff;border-radius:4px;padding:3px 10px;font-size:11px;font-weight:700;text-decoration:none;white-space:nowrap;flex-shrink:0;font-family:var(--font-head);letter-spacing:.04em;text-transform:uppercase;';
      btnPdf.textContent='Öffnen';
      btnPdf.addEventListener('click',e=>e.stopPropagation());
      sfkBar.appendChild(btnPdf);wrap.appendChild(sfkBar);
    }

    // Buttons
    const actions=document.createElement('div');actions.className='card-actions';
    const btnEdit=document.createElement('button');btnEdit.textContent='✎ Bearbeiten';btnEdit.addEventListener('click',e=>{e.stopPropagation();openEdit(a.id);});
    const btnDiag=document.createElement('button');btnDiag.textContent='📋 Diagnose';btnDiag.style.color='#fbbf24';btnDiag.addEventListener('click',e=>{e.stopPropagation();openDiagnose(a.id);});
    const btnArb=document.createElement('button');btnArb.textContent='📝 Arbeiten';btnArb.style.color='#AFA9EC';btnArb.addEventListener('click',e=>{e.stopPropagation();openArbeitenModal(a.id);});
    actions.appendChild(btnEdit);actions.appendChild(btnDiag);actions.appendChild(btnArb);wrap.appendChild(actions);
  }
  return wrap;
}

function initMyName(){if(!myName)setTimeout(()=>askMyName(),800);else updateNameDisplay();}
function updateNameDisplay(){
  const av=document.getElementById('myAvatar'),tx=document.getElementById('myNameText');
  if(myName){av.textContent=myName.charAt(0).toUpperCase();tx.textContent=myName;tx.style.color='var(--text)';}
  else{av.textContent='?';tx.textContent='Wer bist du?';tx.style.color='var(--red)';}
}
function askMyName(){
  const o=document.createElement('div');
  o.style.cssText='position:fixed;inset:0;background:rgba(0,0,0,.9);z-index:300;display:flex;align-items:center;justify-content:center;padding:24px';
  o.innerHTML=`<div style="background:var(--bg2);border:1px solid var(--border2);border-top:3px solid var(--red);border-radius:6px;padding:28px;max-width:360px;width:100%">
    <div style="font-family:var(--font-head);font-size:15px;color:var(--text);margin-bottom:16px;text-transform:uppercase;letter-spacing:.06em">Wer bist du?</div>
    <input id="nameInput" type="text" placeholder="Deinen Namen eingeben …"
      style="width:100%;background:var(--bg3);border:1px solid var(--border2);border-radius:4px;color:var(--text);padding:11px 14px;font-size:15px;outline:none;margin-bottom:12px"
      onkeydown="if(event.key==='Enter')document.getElementById('nameSaveBtn').click()"/>
    <button id="nameSaveBtn" class="btn-primary" style="width:100%">Speichern</button>
  </div>`;
  document.body.appendChild(o);
  const inp=o.querySelector('#nameInput');inp.value=myName;setTimeout(()=>inp.focus(),100);
  o.querySelector('#nameSaveBtn').addEventListener('click',()=>{const v=inp.value.trim();if(!v)return;myName=v;localStorage.setItem('werkstatt-name',myName);document.body.removeChild(o);updateNameDisplay();});
}
function changeMyName(){askMyName();}
async function toggleMitarbeiter(autoId){
  if(!myName){askMyName();return;}
  const a=autos.find(x=>x.id===autoId);if(!a)return;
  if(!a.mitarbeiter)a.mitarbeiter=[];
  const idx=a.mitarbeiter.findIndex(m=>m.name===myName);
  if(idx>=0)a.mitarbeiter.splice(idx,1);else a.mitarbeiter.push({name:myName,seit:uhrzeit()});
  await saveAuto(a);render();
}
async function removeMitarbeiter(autoId,name){
  const a=autos.find(x=>x.id===autoId);if(!a)return;
  a.mitarbeiter=(a.mitarbeiter||[]).filter(m=>m.name!==name);await saveAuto(a);render();
}

// ── SUCHE ──
function handleSearch(val){
  currentSearch=val.trim().toLowerCase();
  document.getElementById('searchClear').classList.toggle('visible',currentSearch.length>0);
  if(currentSearch.length<2)return;
  const hits=autos.filter(a=>a.kennzeichen.toLowerCase().includes(currentSearch)||(a.kunde||'').toLowerCase().includes(currentSearch)||(a.fahrzeug||'').toLowerCase().includes(currentSearch));
  if(!hits.length)return;
  hits.forEach(a=>{if(autos.filter(x=>x.status===a.status).length>=COLLAPSE_AT)expandedCards.add(a.id);else collapsedCards.delete(a.id);});
  render();
  setTimeout(()=>{
    hits.forEach(a=>{
      const s=STATI.find(x=>x.id===a.status);
      document.querySelectorAll('.card-top-kz').forEach(el=>{
        if(el.textContent.trim()===(a.kennzeichen||'—')){
          const wrap=el.closest('.card-wrap');
          if(wrap){wrap.style.setProperty('--flash-color',s?.accent||'#fff');wrap.classList.remove('card-flash');void wrap.offsetWidth;wrap.classList.add('card-flash');wrap.addEventListener('animationend',()=>wrap.classList.remove('card-flash'),{once:true});}
        }
      });
    });
  },50);
}
function clearSearch(){document.getElementById('searchInput').value='';document.getElementById('searchClear').classList.remove('visible');currentSearch='';}

// ── HINTS MODAL ──
let editHinweise=[];
function initHints(h){editHinweise=h.map(x=>typeof x==='string'?{text:x,done:false}:{...x});}
function updateHint(fid,i,v){editHinweise[i].text=v;}
function toggleHintDone(fid,i){editHinweise[i].done=!editHinweise[i].done;refreshHintsList(fid);}
function removeHint(fid,i){editHinweise.splice(i,1);refreshHintsList(fid);}
function addHint(fid){const inp=document.getElementById(fid+'_new');const v=inp.value.trim();if(!v)return;editHinweise.push({text:v,done:false});inp.value='';refreshHintsList(fid);setTimeout(()=>document.getElementById(fid+'_new')?.focus(),0);}
function refreshHintsList(fid){
  const items=document.getElementById(fid+'_items');const wrap=document.getElementById(fid+'_list');if(!items)return;
  wrap.style.display=editHinweise.length?'':'none';
  items.innerHTML=editHinweise.map((h,i)=>`<div class="hint-row">
    <span style="color:${h.done?'var(--text-muted)':'#E8454D'};font-size:13px">${h.done?'◇':'◆'}</span>
    <button class="hint-check ${h.done?'checked':''}" onclick="toggleHintDone('fh',${i})">${h.done?'✓':''}</button>
    <input type="text" class="${h.done?'done':''}" value="${h.text.replace(/"/g,'&quot;')}" oninput="updateHint('fh',${i},this.value)"/>
    <button class="hint-remove" onclick="removeHint('fh',${i})">✕</button>
  </div>`).join('');
}
function hintsEditorHTML(hinweise,fid){return `
  <div id="${fid}_list" style="${hinweise.length?'':'display:none'}">
    <div class="hints-list" id="${fid}_items">
      ${hinweise.map((h,i)=>`<div class="hint-row">
        <span style="color:${h.done?'var(--text-muted)':'#E8454D'};font-size:13px">${h.done?'◇':'◆'}</span>
        <button class="hint-check ${h.done?'checked':''}" onclick="toggleHintDone('${fid}',${i})">${h.done?'✓':''}</button>
        <input type="text" class="${h.done?'done':''}" value="${h.text.replace(/"/g,'&quot;')}" oninput="updateHint('${fid}',${i},this.value)"/>
        <button class="hint-remove" onclick="removeHint('${fid}',${i})">✕</button>
      </div>`).join('')}
    </div>
  </div>
  <div class="hint-add">
    <input id="${fid}_new" placeholder="Stichpunkt hinzufügen … (Enter)" onkeydown="if(event.key==='Enter'){event.preventDefault();addHint('${fid}')}"/>
    <button class="hint-add-btn" onclick="addHint('${fid}')">+</button>
  </div>`;}

      <div style="font-size:20px;margin-bottom:4px">📋</div>
      <div style="color:var(--text-dim);font-size:12px">Fahrzeugschein ablegen oder klicken · Foto oder PDF</div>

    <input type="file" id="fschein_file" accept="image/*,.pdf" style="display:none"/>`}
  </div>
  <div class="section-label">Kundendaten</div>
  <div class="form-grid2">
    <div class="field"><label>Kunde / Firma</label><input id="f_kunde" value="${a.kunde||''}" placeholder="Max Mustermann" autofocus/></div>
    <div class="field"><label>Kennzeichen</label><input id="f_kz" value="${a.kennzeichen}" oninput="this.value=this.value.toUpperCase()" placeholder="EN-AB 123"/></div>
  </div>
  <div class="section-label">Fahrzeug & Auftrag</div>
  <div class="form-grid3">
    <div class="field"><label>Fahrzeug</label><input id="f_fz" value="${a.fahrzeug}" placeholder="Mustang, Camaro …"/></div>
    <div class="field"><label>Priorität</label><select id="f_prio">${PRIORITAET.map(x=>`<option${x===a.prioritaet?' selected':''}>${x}</option>`).join('')}</select></div>
    <div class="field"><label>Arbeitsplatz (opt.)</label><input id="f_platz" value="${a.platz}" placeholder="Hebebühne 2 …"/></div>

function openNeu(){
  const a={id:genId(),kennzeichen:'',fahrzeug:'',kunde:'',prioritaet:'Normal',hinweise:[],platz:'',status:'parkplatz',auftragsnr:'',arbeiten:[],material:[],lieferscheine:[],dateien:[],eingang:uhrzeit(),datum:datumKurz(),statusSeit:uhrzeit()};
  openModal(formHTML(a,false));
  setupFormListeners(a,false);
}
function openEdit(id){const a=autos.find(x=>x.id===id);if(a){openModal(formHTML(a,true));setupFormListeners(a,true);}}
function setupFormListeners(a,isEdit){
  document.getElementById('btnSaveForm').addEventListener('click',()=>saveForm(a.id,isEdit));
  const fscheinDrop=document.getElementById('fschein_drop');
  const fscheinFile=document.getElementById('fschein_file');
  if(fscheinDrop&&fscheinFile){
    fscheinDrop.addEventListener('click',()=>fscheinFile.click());
    fscheinDrop.addEventListener('dragover',e=>{e.preventDefault();fscheinDrop.style.borderColor='var(--red)';});
    fscheinDrop.addEventListener('dragleave',()=>{fscheinDrop.style.borderColor='';});
    fscheinDrop.addEventListener('drop',e=>{e.preventDefault();if(e.dataTransfer.files[0])uploadFahrzeugschein(a.id,{files:e.dataTransfer.files});});
    fscheinFile.addEventListener('change',()=>uploadFahrzeugschein(a.id,fscheinFile));
  }
  const btnRemove=document.getElementById('btnRemoveFschein');
  if(btnRemove)btnRemove.addEventListener('click',()=>removeFahrzeugschein(a.id));
}
async function saveForm(id,isEdit){
  const kz=document.getElementById('f_kz').value.trim();
  if(!kz){alert('Kennzeichen ist Pflichtfeld');return;}
  const data={kennzeichen:kz,kunde:document.getElementById('f_kunde').value.trim(),
    fahrzeug:document.getElementById('f_fz').value,prioritaet:document.getElementById('f_prio').value,
    platz:document.getElementById('f_platz').value,hinweise:[...editHinweise]};
  if(isEdit){const a=autos.find(x=>x.id===id);if(a)Object.assign(a,data);await saveAuto(autos.find(x=>x.id===id));}
  else{const a={id,...data,status:'parkplatz',auftragsnr:'',arbeiten:[],material:[],lieferscheine:[],dateien:[],eingang:uhrzeit(),datum:datumKurz(),statusSeit:uhrzeit()};autos.push(a);await saveAuto(a);}
  closeModal();render();
}
async function uploadFahrzeugschein(autoId,input){
  const file=input.files[0];if(!file)return;
  const a=autos.find(x=>x.id===autoId);if(!a)return;
  try{
    setSync('syncing','↻ Hochladen …');
    const url=await uploadFile(file,`auftraege/${autoId}/fahrzeugschein_${file.name}`);
    a.dateien=(a.dateien||[]).filter(d=>d.typ!=='fahrzeugschein');
    a.dateien.push({name:file.name,url,typ:'fahrzeugschein',datum:datumKurz()});
    await saveAuto(a);setSync('ok','● Live');openEdit(autoId);
  }catch(e){setSync('error','✕ Fehler');}
}
async function removeFahrzeugschein(autoId){
  const a=autos.find(x=>x.id===autoId);if(!a)return;
  a.dateien=(a.dateien||[]).filter(d=>d.typ!=='fahrzeugschein');await saveAuto(a);openEdit(autoId);
}

// ── DIAGNOSE ──
function emptyDiagnose(){
  const d={km:'',tuev:'',fehlerspeicher:'',was_machen:'',hinweise:''};
  [...DIAG_ITEMS_LEFT,...DIAG_ITEMS_RIGHT,...DIAG_BREMSEN,...DIAG_REIFEN].forEach(k=>d[k]='');
  return d;
}
function openDiagnose(autoId){
  const a=autos.find(x=>x.id===autoId);if(!a)return;
  // Diagnose aus DB sicherstellen
  if(!a.diagnose||typeof a.diagnose!=='object')a.diagnose=emptyDiagnose();
  const d=a.diagnose;

  function statusBtns(key){
    const val=d[key]||'';
    return `<div class="diag-btns">
      <button class="diag-btn diag-btn-ok ${val==='ok'?'active':''}" data-key="${key}" data-val="ok">OK</button>
      <button class="diag-btn diag-btn-nok ${val==='nok'?'active':''}" data-key="${key}" data-val="nok">✕</button>
    </div>`;}
  function diagRow(label,key){
    return `<div class="diag-row"><span class="diag-row-label">${label}</span>${statusBtns(key)}</div>`;}

  openModal(`
    <div class="modal-header">
      <span class="modal-title">📋 Diagnose — ${a.kennzeichen}</span>
      <button class="modal-close" onclick="closeModal()">✕</button>
    </div>

function toggleDiktieren(autoId,typ){if(isRecording&&diktierAutoId===autoId&&diktierTyp===typ)stopDiktieren();else startDiktieren(autoId,typ);}
function startDiktieren(autoId,typ){
  const SR=window.SpeechRecognition||window.webkitSpeechRecognition;
  if(!SR){alert('Diktierfunktion wird in diesem Browser nicht unterstützt. Bitte Chrome oder Safari nutzen.');return;}
  diktierAutoId=autoId;diktierTyp=typ;diktierText='';isRecording=true;
  const btnId=typ==='material'?'btnDiktierMaterial':'btnDiktierArbeit';
  const btn=document.getElementById(btnId);
  const preview=document.getElementById(`diktierPreview_${typ}`);
  if(btn){btn.textContent='⏹ Aufnahme stoppen';btn.classList.add('recording');}
  if(preview){preview.style.display='block';preview.className='diktier-preview active';preview.textContent='🎤 Spreche …';}
  recognition=new SR();recognition.lang='de-DE';recognition.continuous=true;recognition.interimResults=true;
  recognition.onresult=e=>{let f='',it='';for(let i=e.resultIndex;i<e.results.length;i++){if(e.results[i].isFinal)f+=e.results[i][0].transcript+' ';else it+=e.results[i][0].transcript;}diktierText+=f;if(preview)preview.textContent='🎤 '+diktierText+it;};
  recognition.onerror=()=>stopDiktieren();
  recognition.onend=()=>{if(isRecording)recognition.start();};
  recognition.start();
}
async function stopDiktieren(){
  isRecording=false;
  if(recognition){recognition.onend=null;recognition.stop();recognition=null;}
  const autoId=diktierAutoId,typ=diktierTyp;
  const btnId=typ==='material'?'btnDiktierMaterial':'btnDiktierArbeit';
  const btn=document.getElementById(btnId);
  const preview=document.getElementById(`diktierPreview_${typ}`);
  await new Promise(r=>setTimeout(r,600));
  if(!diktierText.trim()){if(btn){btn.textContent='🎤 Diktieren';btn.classList.remove('recording');}if(preview)preview.style.display='none';return;}
  if(btn){btn.textContent='⏳ KI analysiert …';btn.classList.remove('recording');btn.disabled=true;}
  if(preview)preview.innerHTML='<span style="color:#fbbf24">⏳ KI analysiert …</span>';
  const txt=diktierText.trim();
  const isMat=typ==='material';
  const system=isMat?`Extrahiere verbrauchtes Material aus dem Diktat. Antworte NUR mit JSON:{"eintraege":[{"bezeichnung":"Name","menge":"Zahl oder leer","einheit":"Stk oder Ltr etc"}]}`
    :`Extrahiere durchgeführte Arbeiten aus dem Diktat. Antworte NUR mit JSON:{"eintraege":[{"beschreibung":"kurze Arbeit max 6 Wörter","stunden":"Zahl oder leer"}]}`;
  try{
    const res=await fetch('https://api.anthropic.com/v1/messages',{method:'POST',headers:{'Content-Type':'application/json'},
      body:JSON.stringify({model:'claude-sonnet-4-5',max_tokens:500,system,messages:[{role:'user',content:`Diktat: "${txt}"`}]})});
    if(!res.ok)throw new Error('API Fehler');
    const data=await res.json();
    const raw=data.content.map(i=>i.text||'').join('').trim();
    const parsed=JSON.parse(raw.replace(/^```json\s*/,'').replace(/\s*```$/,'').trim());
    const eintraege=parsed.eintraege||[];
    const a=autos.find(x=>x.id===autoId);
    if(a){
      if(isMat)eintraege.forEach(e=>a.material.push({bezeichnung:e.bezeichnung||'',menge:e.menge||'',einheit:e.einheit||'Stk'}));
      else eintraege.forEach(e=>a.arbeiten.push({beschreibung:e.beschreibung||'',stunden:e.stunden||'',wer:myName||''}));
      await saveAuto(a);
    }
    if(preview){preview.className='diktier-preview';preview.innerHTML=`<div style="color:#4ade80;font-size:12px;font-weight:600;margin-bottom:6px">✓ ${eintraege.length} Einträge übernommen</div>`+eintraege.map(e=>`<div style="padding:3px 0;border-bottom:1px solid var(--border);font-size:12px"><span style="color:var(--red)">◆</span> ${isMat?(e.bezeichnung+' '+(e.menge?e.menge+' '+e.einheit:'')):(e.beschreibung+(e.stunden?' — '+e.stunden+' Std':''))}</div>`).join('');}
    if(isMat)renderMaterialList(autoId);else renderArbeitenList(autoId);
  }catch(e){
    console.error(e);
    const a=autos.find(x=>x.id===autoId);
    if(a&&txt){if(isMat)a.material.push({bezeichnung:txt,menge:'',einheit:'Stk'});else a.arbeiten.push({beschreibung:txt,stunden:'',wer:myName||''});await saveAuto(a);if(isMat)renderMaterialList(autoId);else renderArbeitenList(autoId);}
    if(preview)preview.innerHTML='<span style="color:#fbbf24">⚠ KI nicht verfügbar — Text direkt übernommen</span>';
  }
  if(btn){btn.textContent='🎤 Diktieren';btn.disabled=false;btn.classList.remove('recording');}
}

async function openBarcodeScanner(){
  const overlay=document.createElement('div');
  overlay.style.cssText='position:fixed;inset:0;background:rgba(0,0,0,.95);z-index:300;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px;padding:24px';
  overlay.innerHTML=`<div style="font-family:var(--font-head);font-size:14px;color:var(--text);letter-spacing:.1em;text-transform:uppercase">SFK Auftrag scannen</div>
    <div style="position:relative;width:260px;height:180px;border:2px solid var(--red);border-radius:8px;overflow:hidden;background:#000"><video id="scanVideo" style="width:100%;height:100%;object-fit:cover" autoplay playsinline></video><div style="position:absolute;top:50%;left:10%;right:10%;height:2px;background:var(--red);opacity:.7"></div></div>
    <div id="scanStatus" style="font-size:13px;color:var(--text-dim)">Kamera wird gestartet …</div>
    <div style="display:flex;gap:8px"><input id="manualNr" placeholder="Auftragsnr. manuell" style="background:var(--bg3);border:1px solid var(--border2);border-radius:4px;color:var(--text);padding:10px 12px;font-size:14px;outline:none;width:180px"/><button class="btn-primary" id="manualBtn">Suchen</button></div>
    <button class="btn-secondary" id="scanClose">Abbrechen</button>`;
  document.body.appendChild(overlay);
  const close=s=>{if(s)s.getTracks().forEach(t=>t.stop());document.body.removeChild(overlay);};
  const doSearch=nr=>{const a=autos.find(x=>x.auftragsnr===nr||x.kennzeichen===nr.toUpperCase());if(a){close(null);activeMobileTab=a.status;const s=STATI.find(x=>x.id===a.status);expandedCards.add(a.id);collapsedCards.delete(a.id);render();setTimeout(()=>{document.querySelectorAll('.card-top-kz').forEach(el=>{if(el.textContent.trim()===(a.kennzeichen||'—')){const w=el.closest('.card-wrap');if(w){w.scrollIntoView({behavior:'smooth',block:'center'});w.style.setProperty('--flash-color',s?.accent||'#fff');w.classList.add('card-flash');w.addEventListener('animationend',()=>w.classList.remove('card-flash'),{once:true});}}});},300);}else{document.getElementById('scanStatus').textContent=`⚠ Auftrag "${nr}" nicht gefunden`;document.getElementById('scanStatus').style.color='var(--red)';}};
  overlay.querySelector('#manualBtn').addEventListener('click',()=>doSearch(overlay.querySelector('#manualNr').value.trim()));
  overlay.querySelector('#manualNr').addEventListener('keydown',e=>{if(e.key==='Enter')doSearch(overlay.querySelector('#manualNr').value.trim());});
  overlay.querySelector('#scanClose').addEventListener('click',()=>close(null));
  try{
    const stream=await navigator.mediaDevices.getUserMedia({video:{facingMode:'environment'}});
    overlay.querySelector('#scanVideo').srcObject=stream;
    document.getElementById('scanStatus').textContent='Halte den SFK-Barcode vor die Kamera';
    overlay.querySelector('#scanClose').addEventListener('click',()=>close(stream),{once:true});
    if('BarcodeDetector' in window){const det=new BarcodeDetector();const scan=async()=>{if(!document.body.contains(overlay))return;try{const codes=await det.detect(overlay.querySelector('#scanVideo'));if(codes.length>0){doSearch(codes[0].rawValue);close(stream);return;}}catch{}requestAnimationFrame(scan);};scan();}
  }catch{document.getElementById('scanStatus').textContent='Kamera nicht verfügbar — Auftragsnr. manuell eingeben';}
}

}

async function analyzeSFKPDF(f){
  const statusEl=document.getElementById('sfk_status');
  const errEl=document.getElementById('sfk_error');
  const analyzeBtn=document.getElementById('sfk_analyze_btn');
  const importBtn=document.getElementById('sfk_import_btn');

  if(!getAnthropicKey()){
    errEl.textContent='⚠ Kein API-Key gesetzt. Bitte zuerst im ⚙️ Adminbereich unter "KI-Analyse" den Anthropic API-Key eintragen.';
    errEl.style.display='block';return;
  }

  errEl.style.display='none';
  importBtn.style.display='none';
  analyzeBtn.style.display='none';
  statusEl.style.display='block';
  statusEl.textContent='⏳ KI analysiert den Auftrag …';

  try{
    const b64=await new Promise((res,rej)=>{
      const r=new FileReader();
      r.onload=()=>res(r.result.split(',')[1]);
      r.onerror=rej;
      r.readAsDataURL(f);
    });

    const response=await fetch('https://api.anthropic.com/v1/messages',{
      method:'POST',
      headers:{
        'Content-Type':'application/json',
        'anthropic-version':'2023-06-01',
        'x-api-key':getAnthropicKey(),
        'anthropic-dangerous-direct-browser-access':'true'
      },
      body:JSON.stringify({
        model:'claude-sonnet-4-5',
        max_tokens:1000,
        system:`Du bist ein Assistent der SFK-Werkstattaufträge analysiert. Antworte NUR mit einem JSON-Objekt, ohne Markdown-Blöcke, ohne Erklärung:
{"kennzeichen":"","kunde":"","fahrzeug":"","auftragsnr":"","arbeiten":["max 5 Wörter pro Stichpunkt"]}
Extrahiere alle Arbeitspositionen als kurze prägnante Stichpunkte (Variante A: kurz & prägnant, max 5 Wörter).`,
        messages:[{
          role:'user',
          content:[
            {type:'document',source:{type:'base64',media_type:'application/pdf',data:b64}},
            {type:'text',text:'Analysiere diesen SFK-Werkstattauftrag und gib das JSON zurück.'}
          ]
        }]
      })
    });

    if(!response.ok){
      const errBody=await response.text();
      throw new Error(`API ${response.status}: ${errBody}`);
    }

    const data=await response.json();
    const rawText=data.content.map(i=>i.text||'').join('').trim()
      .replace(/^```json\s*/,'').replace(/\s*```$/,'').trim();

    sfkParsedData=JSON.parse(rawText);
    sfkParsedData._pdfFile=f;
    showSFKPreview();
    statusEl.style.display='none';

  }catch(e){
    console.error('SFK Analyse Fehler:',e);
    statusEl.style.display='none';
    errEl.style.display='block';

    // Distinguish CORS/network from API errors
    if(e.message.includes('Failed to fetch')||e.message.includes('NetworkError')){
      errEl.textContent='⚠ Verbindungsfehler: Das Dashboard muss über GitHub Pages (HTTPS) geöffnet sein, nicht als lokale Datei.';
    } else {
      errEl.textContent='⚠ Analyse fehlgeschlagen: '+e.message;
    }
    analyzeBtn.style.display='block';
    analyzeBtn.textContent='🔄 Erneut versuchen';
  }
}

async function doImportSFK(){
  if(!sfkParsedData){return;}
  const p=sfkParsedData;
  const btn=document.getElementById('sfk_import_btn');
  const statusEl=document.getElementById('sfk_status');
  btn.disabled=true;
  statusEl.style.display='block';
  statusEl.textContent='⏳ Auftrag wird angelegt …';

  // Duplikatsprüfung
  const kzCheck=(p.kennzeichen||'').toUpperCase().trim();
  const nrCheck=(p.auftragsnr||'').trim();
  const duplikat=autos.find(x=>
    (kzCheck&&x.kennzeichen===kzCheck&&nrCheck&&x.auftragsnr===nrCheck)||
    (kzCheck&&x.kennzeichen===kzCheck&&!nrCheck)
  );
  if(duplikat){
    const confirmed=await new Promise(res=>{
      const o=document.createElement('div');
      o.style.cssText='position:fixed;inset:0;background:rgba(0,0,0,.85);z-index:400;display:flex;align-items:center;justify-content:center;padding:24px';
      o.innerHTML=`<div style="background:var(--bg2);border:1px solid var(--border2);border-top:3px solid #fbbf24;border-radius:6px;padding:28px;max-width:400px;width:100%">
        <div style="font-size:20px;margin-bottom:8px">⚠️</div>
        <div style="font-family:var(--font-head);font-size:15px;color:#fbbf24;margin-bottom:8px;text-transform:uppercase">Auftrag bereits vorhanden</div>
        <div style="font-size:13px;color:var(--text-dim);margin-bottom:20px;line-height:1.6">
          Ein Auftrag für <strong style="color:var(--text)">${kzCheck}</strong>${nrCheck?' (Nr. '+nrCheck+')':''} ist bereits angelegt.<br>Trotzdem als neuen Auftrag importieren?
        </div>
        <div style="display:flex;gap:10px;justify-content:flex-end">
          <button class="btn-secondary" id="dupNein">Abbrechen</button>
          <button class="btn-primary" id="dupJa" style="background:#92400e;border-color:#b45309">Trotzdem importieren</button>
        </div></div>`;
      document.body.appendChild(o);
      o.querySelector('#dupNein').addEventListener('click',()=>{document.body.removeChild(o);res(false);});
      o.querySelector('#dupJa').addEventListener('click',()=>{document.body.removeChild(o);res(true);});
    });
    if(!confirmed){btn.disabled=false;statusEl.style.display='none';return;}
  }

  const id=genId();
  const a={
    id,
    kennzeichen:(p.kennzeichen||'').toUpperCase(),
    fahrzeug:p.fahrzeug||'',
    kunde:p.kunde||'',
    auftragsnr:p.auftragsnr||'',
    platz:'',
    prioritaet:'Normal',
    status:'parkplatz',
    hinweise:(p.arbeiten||[]).map(t=>({text:t,done:false})),
    arbeiten:[],material:[],lieferscheine:[],dateien:[],
    eingang:uhrzeit(),datum:datumKurz(),statusSeit:uhrzeit()
  };

  // Upload original PDF to Supabase Storage
  if(p._pdfFile){
    try{
      statusEl.textContent='⏳ PDF wird hochgeladen …';
      const url=await uploadFile(p._pdfFile,`auftraege/${id}/sfk_${p._pdfFile.name}`);
      a.dateien.push({name:p._pdfFile.name,url,typ:'sfk_auftrag',datum:datumKurz()});
    }catch(e){
      console.warn('PDF-Upload fehlgeschlagen, Auftrag wird trotzdem angelegt:',e);
    }
  }

  autos.push(a);
  await saveAuto(a);
  closeModal();
  render();
  sfkPendingFile=null;
  sfkParsedData=null;
}

    if(alt!==getPin()){msg.textContent='❌ Aktueller Code falsch';msg.style.display='block';return;}
    if(neu.length!==6||isNaN(neu)){msg.textContent='❌ Neuer Code muss 6 Ziffern haben';msg.style.display='block';return;}
    if(neu!==neu2){msg.textContent='❌ Codes stimmen nicht überein';msg.style.display='block';return;}
    localStorage.setItem('werkstatt-pin',neu);document.body.removeChild(o);
  });
}

// ── ADMIN ──
function openAdmin(){
  if(!adminUnlocked){
    const o=document.createElement('div');
    o.style.cssText='position:fixed;inset:0;background:rgba(0,0,0,.9);z-index:300;display:flex;align-items:center;justify-content:center;padding:24px';
    o.innerHTML=`<div style="background:var(--bg2);border:1px solid var(--border2);border-top:3px solid var(--red);border-radius:6px;padding:28px;max-width:340px;width:100%">
      <div style="font-family:var(--font-head);font-size:15px;color:var(--text);margin-bottom:18px;text-transform:uppercase;letter-spacing:.06em">⚙️ Adminbereich</div>
      <div class="field"><input id="adminPw" type="password" placeholder="Passwort"
        style="width:100%;background:var(--bg3);border:1px solid var(--border2);border-radius:4px;color:var(--text);padding:11px 14px;font-size:15px;outline:none"
        onkeydown="if(event.key==='Enter')document.getElementById('adminLoginBtn').click()"/></div>
      <div id="adminErr" style="color:var(--red);font-size:13px;margin-bottom:10px;display:none">❌ Falsches Passwort</div>
      <div style="display:flex;gap:10px;justify-content:flex-end">
        <button class="btn-secondary" id="adminCancel">Abbrechen</button>
        <button class="btn-primary" id="adminLoginBtn">Einloggen</button>
      </div></div>`;
    document.body.appendChild(o);
    setTimeout(()=>o.querySelector('#adminPw').focus(),100);
    o.querySelector('#adminCancel').addEventListener('click',()=>document.body.removeChild(o));
    o.querySelector('#adminLoginBtn').addEventListener('click',()=>{
      if(o.querySelector('#adminPw').value===ADMIN_PW){adminUnlocked=true;document.body.removeChild(o);showAdminPanel();}
      else{o.querySelector('#adminErr').style.display='block';o.querySelector('#adminPw').value='';}
    });
  }else showAdminPanel();
}

function showAdminPanel(){
  const heute=datumKurz();
  const gesamtStd=autos.reduce((s,a)=>s+(a.arbeiten||[]).reduce((ss,ar)=>ss+(parseFloat(ar.stunden)||0),0),0);
  openModal(`
    <div class="modal-header">
      <span class="modal-title">⚙️ Adminbereich</span>
      <button class="modal-close" onclick="closeModal();adminUnlocked=false">✕</button>
    </div>
    <div class="admin-section">
      <div class="admin-section-title">📊 Statistiken</div>
      <div class="stat-grid">
        <div class="stat-box"><div class="stat-box-val">${autos.length}</div><div class="stat-box-lbl">Aufträge</div></div>
        <div class="stat-box"><div class="stat-box-val">${autos.filter(a=>a.datum===heute).length}</div><div class="stat-box-lbl">Heute</div></div>
        <div class="stat-box"><div class="stat-box-val">${gesamtStd.toFixed(1)}</div><div class="stat-box-lbl">Stunden</div></div>
      </div>
    </div>
    <div class="admin-section">
      <div class="admin-section-title">🤖 KI-Analyse (SFK-Import)</div>
      <div class="admin-row">
        <div>
          <div class="admin-row-label">Anthropic API-Key</div>
          <div class="admin-row-sub">Wird nur lokal auf diesem Gerät gespeichert</div>
        </div>
        <button class="btn-secondary" id="btnApiKey">Eintragen</button>
      </div>
      <div id="apiKeyStatus" style="font-size:12px;margin-top:6px"></div>
    </div>
    <div class="admin-section">
      <div class="admin-section-title">🔒 Login-Code ändern</div>
      <div class="admin-row">
        <div><div class="admin-row-label">Zugangscode für Mitarbeiter</div></div>
        <button class="btn-secondary" id="btnAdminPin">Ändern</button>
      </div>
    </div>
    <div class="admin-section">
      <div class="admin-section-title">📋 Spalten umbenennen</div>
      ${STATI.map(s=>`<div class="admin-row">
        <div class="admin-row-label">${s.icon} ${s.label}</div>
        <input id="spalte_${s.id}" value="${s.label}" style="background:var(--bg4);border:1px solid var(--border2);border-radius:4px;color:var(--text);padding:6px 10px;font-size:13px;outline:none;width:180px"/>
      </div>`).join('')}
      <button class="btn-primary" id="btnSaveSpalten" style="width:100%;margin-top:10px">✓ Spalten speichern</button>
    </div>
    <div class="admin-section">
      <div class="admin-section-title">✅ Diagnose-Checkliste</div>
      <div class="admin-row">
        <div><div class="admin-row-label">Checklisten-Punkte bearbeiten</div></div>
        <button class="btn-secondary" id="btnDiagAdmin">Bearbeiten</button>
      </div>
    </div>
    <div class="admin-section">
      <div class="admin-section-title">💾 Backup</div>
      <div class="admin-row"><div class="admin-row-label">Alle Aufträge exportieren</div><button class="btn-secondary" id="btnBackupEx">Export</button></div>
      <div class="admin-row"><div class="admin-row-label">Backup wiederherstellen</div><button class="btn-secondary" id="btnBackupIm">Import</button></div>
    </div>
    <div style="text-align:right;margin-top:8px">
      <button class="btn-secondary" style="font-size:11px;color:var(--text-muted)" onclick="adminUnlocked=false;closeModal()">🔒 Abmelden</button>
    </div>
  `);
  document.getElementById('btnAdminPin').addEventListener('click',()=>{closeModal();openPinAendern();});
  // API Key status anzeigen
  const keyStatus=document.getElementById('apiKeyStatus');
  if(getAnthropicKey()){keyStatus.innerHTML='<span style="color:#4ade80">✓ API-Key ist gesetzt</span>';}
  else{keyStatus.innerHTML='<span style="color:var(--red)">✕ Kein API-Key gesetzt — SFK-Import funktioniert nicht</span>';}
  document.getElementById('btnApiKey').addEventListener('click',()=>{
    const o=document.createElement('div');
    o.style.cssText='position:fixed;inset:0;background:rgba(0,0,0,.9);z-index:300;display:flex;align-items:center;justify-content:center;padding:24px';
    o.innerHTML=`<div style="background:var(--bg2);border:1px solid var(--border2);border-top:3px solid var(--red);border-radius:6px;padding:28px;max-width:480px;width:100%">
      <div style="font-family:var(--font-head);font-size:15px;color:var(--text);margin-bottom:6px;text-transform:uppercase;letter-spacing:.06em">🤖 Anthropic API-Key</div>
      <div style="font-size:12px;color:var(--text-dim);margin-bottom:16px;line-height:1.6">Den Key findest du unter <span style="color:var(--red)">console.anthropic.com</span> → API Keys.<br>Er wird nur auf diesem Gerät gespeichert — nicht in der Datei.</div>
      <input id="apiKeyInput" type="password" placeholder="sk-ant-api03-..."
        style="width:100%;background:var(--bg3);border:1px solid var(--border2);border-radius:4px;color:var(--text);padding:11px 14px;font-size:13px;outline:none;margin-bottom:12px;font-family:monospace"/>
      <div id="apiKeyErr" style="color:var(--red);font-size:12px;margin-bottom:8px;display:none"></div>
      <div style="display:flex;gap:10px;justify-content:flex-end">
        <button class="btn-secondary" id="apiKeyCancel">Abbrechen</button>
        <button class="btn-primary" id="apiKeySave">Speichern</button>
      </div></div>`;
    document.body.appendChild(o);
    const inp=o.querySelector('#apiKeyInput');
    inp.value=getAnthropicKey();
    setTimeout(()=>inp.focus(),100);
    o.querySelector('#apiKeyCancel').addEventListener('click',()=>document.body.removeChild(o));
    o.querySelector('#apiKeySave').addEventListener('click',()=>{
      const v=inp.value.trim();
      if(!v.startsWith('sk-ant-')){
        o.querySelector('#apiKeyErr').textContent='⚠ Ungültiger Key — muss mit sk-ant- beginnen';
        o.querySelector('#apiKeyErr').style.display='block';return;
      }
      localStorage.setItem('werkstatt-anthropic-key',v);
      document.body.removeChild(o);
      showAdminPanel();
    });
  });
  document.getElementById('btnSaveSpalten').addEventListener('click',()=>{
    const c={};STATI.forEach(s=>{const el=document.getElementById('spalte_'+s.id);if(el&&el.value.trim()){c[s.id]=el.value.trim();s.label=el.value.trim();}});
    localStorage.setItem('werkstatt-spalten',JSON.stringify(c));closeModal();render();renderMobileTabs();
  });
  document.getElementById('btnDiagAdmin').addEventListener('click',openDiagAdmin);
  document.getElementById('btnBackupEx').addEventListener('click',exportBackup);
  document.getElementById('btnBackupIm').addEventListener('click',importBackup);
}

function openDiagAdmin(){
  openModal(`
    <div class="modal-header"><span class="modal-title">✅ Checkliste anpassen</span><button class="modal-close" onclick="closeModal()">✕</button></div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:0 16px">
      <div><div class="section-label">Spalte Links</div><div id="diagAdminLeft">${DIAG_ITEMS_LEFT.map((item,i)=>`<div style="display:flex;gap:6px;margin-bottom:6px"><input value="${item}" style="flex:1;background:var(--bg3);border:1px solid var(--border2);border-radius:4px;color:var(--text);padding:6px 8px;font-size:12px;outline:none" onchange="DIAG_ITEMS_LEFT[${i}]=this.value"/><button onclick="DIAG_ITEMS_LEFT.splice(${i},1);openDiagAdmin()" style="background:none;border:none;color:var(--text-muted);cursor:pointer;font-size:14px">✕</button></div>`).join('')}</div>
      <button class="btn-secondary" style="width:100%;font-size:12px" onclick="DIAG_ITEMS_LEFT.push('Neuer Punkt');openDiagAdmin()">+ Hinzufügen</button></div>
      <div><div class="section-label">Spalte Rechts</div><div id="diagAdminRight">${DIAG_ITEMS_RIGHT.map((item,i)=>`<div style="display:flex;gap:6px;margin-bottom:6px"><input value="${item}" style="flex:1;background:var(--bg3);border:1px solid var(--border2);border-radius:4px;color:var(--text);padding:6px 8px;font-size:12px;outline:none" onchange="DIAG_ITEMS_RIGHT[${i}]=this.value"/><button onclick="DIAG_ITEMS_RIGHT.splice(${i},1);openDiagAdmin()" style="background:none;border:none;color:var(--text-muted);cursor:pointer;font-size:14px">✕</button></div>`).join('')}</div>
      <button class="btn-secondary" style="width:100%;font-size:12px" onclick="DIAG_ITEMS_RIGHT.push('Neuer Punkt');openDiagAdmin()">+ Hinzufügen</button></div>
    </div>
    <div class="form-footer"><button class="btn-secondary" onclick="showAdminPanel()">Zurück</button><button class="btn-primary" id="btnSaveDiag">✓ Speichern</button></div>
  `);
  document.getElementById('btnSaveDiag').addEventListener('click',()=>{
    localStorage.setItem('werkstatt-diag-left',JSON.stringify(DIAG_ITEMS_LEFT));
    localStorage.setItem('werkstatt-diag-right',JSON.stringify(DIAG_ITEMS_RIGHT));
    closeModal();
  });
}

function exportBackup(){
  const json=JSON.stringify({version:1,datum:new Date().toISOString(),auftraege:autos},null,2);
  const o=document.createElement('div');
  o.style.cssText='position:fixed;inset:0;background:rgba(0,0,0,.9);z-index:300;display:flex;align-items:center;justify-content:center;padding:24px';
  o.innerHTML=`<div style="background:var(--bg2);border:1px solid var(--border2);border-top:3px solid var(--red);border-radius:6px;padding:24px;max-width:560px;width:100%">
    <div style="font-family:var(--font-head);font-size:13px;color:var(--text);margin-bottom:10px;text-transform:uppercase">💾 Backup exportieren</div>
    <textarea readonly onclick="this.select()" style="width:100%;height:150px;background:var(--bg4);border:1px solid var(--border2);border-radius:4px;color:#4ade80;font-size:11px;padding:10px;outline:none;resize:none;font-family:monospace">${json}</textarea>
    <div style="display:flex;justify-content:flex-end;gap:10px;margin-top:12px">
      <button class="btn-secondary" id="bClose">Schließen</button>
      <button class="btn-primary" id="bCopy">📋 Kopieren</button>
    </div></div>`;
  document.body.appendChild(o);
  o.querySelector('#bClose').addEventListener('click',()=>document.body.removeChild(o));
  o.querySelector('#bCopy').addEventListener('click',()=>{navigator.clipboard.writeText(json).then(()=>{o.querySelector('#bCopy').textContent='✓ Kopiert!';});});
}

function importBackup(){
  const o=document.createElement('div');
  o.style.cssText='position:fixed;inset:0;background:rgba(0,0,0,.9);z-index:300;display:flex;align-items:center;justify-content:center;padding:24px';
  o.innerHTML=`<div style="background:var(--bg2);border:1px solid var(--border2);border-top:3px solid var(--red);border-radius:6px;padding:24px;max-width:560px;width:100%">
    <div style="font-family:var(--font-head);font-size:13px;color:var(--text);margin-bottom:10px;text-transform:uppercase">💾 Backup importieren</div>
    <textarea id="bTxt" placeholder="Backup-JSON hier einfügen …" style="width:100%;height:150px;background:var(--bg4);border:1px solid var(--border2);border-radius:4px;color:var(--text);font-size:11px;padding:10px;outline:none;resize:none;font-family:monospace;margin-bottom:10px"></textarea>
    <div id="bErr" style="color:var(--red);font-size:13px;margin-bottom:8px;display:none"></div>
    <div style="display:flex;justify-content:flex-end;gap:10px">
      <button class="btn-secondary" id="bCancel">Abbrechen</button>
      <button class="btn-primary" id="bRestore">Wiederherstellen</button>
    </div></div>`;
  document.body.appendChild(o);
  o.querySelector('#bCancel').addEventListener('click',()=>document.body.removeChild(o));
  o.querySelector('#bRestore').addEventListener('click',async()=>{
    try{
      const data=JSON.parse(o.querySelector('#bTxt').value.trim());
      const list=data.auftraege||data;
      if(!Array.isArray(list))throw new Error('Ungültiges Format');
      autos=list.map(a=>({...a,hinweise:(a.hinweise||[]).map(h=>typeof h==='string'?{text:h,done:false}:h)}));
      for(const a of autos)await saveAuto(a);
      document.body.removeChild(o);closeModal();render();
    }catch(e){o.querySelector('#bErr').textContent='⚠ '+e.message;o.querySelector('#bErr').style.display='block';}
  });
}

// ── START ──
if(sessionStorage.getItem('werkstatt-auth')==='1'){
  document.getElementById('pinScreen').style.display='none';
  initMyName();loadAutos();startRealtime();
}else{
  initBio();
}
</script>
